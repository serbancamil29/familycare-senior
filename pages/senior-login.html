<!doctype html><html lang="ro"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FamilyCare</title><link rel="manifest" href="/manifest.webmanifest"><link rel="stylesheet" href="/styles/common.css?v=5.0.1"><link rel="stylesheet" href="/styles/access-v4.css?v=5.0.1"></head><body class="access-page"><button id="themeBtn" class="theme-floating">☾</button><main class="access-shell"><section class="access-card"><div class="brand-block"><strong>FamilyCare</strong><span>v5.0.1</span></div><div id="roleChoice"><h1>Cine folosește aplicația?</h1><p>Alege tipul de acces.</p><div class="role-grid"><button data-role="caregiver" class="role-card"><span class="role-icon">👨‍👩‍👧</span><strong>Aparținător</strong><small>Administrează rețeaua și beneficiarii</small></button><button data-role="senior" class="role-card"><span class="role-icon">👤</span><strong>Senior</strong><small>Intră cu utilizator și PIN</small></button></div></div>
<div id="caregiverMode" hidden><button type="button" class="back-role">← Înapoi</button><div class="subtabs"><button class="active" data-sub="login">Intră în cont</button><button data-sub="setup">Creează rețeaua</button></div><form id="caregiverLogin" class="form-stack"><h1>Acces aparținător</h1><label>Utilizator sau telefon<input name="identifier" required></label><label>Parolă<input name="password" type="password" required></label><button class="primary">Intră în rețea</button></form><form id="networkSetup" class="form-stack" hidden><h1>Creează rețeaua</h1><div class="grid2"><label>Prenume<input name="firstName" required></label><label>Nume<input name="lastName" required></label></div><div class="grid2"><label>Telefon<input name="phone" required></label><label>Utilizator<input name="user" required></label></div><label>Parolă<input name="password" type="password" minlength="8" required></label><div class="beneficiary-head"><h2>Beneficiari</h2><button type="button" id="addBeneficiary" class="secondary">+ Adaugă</button></div><div id="beneficiaryRows"></div><button class="primary">Creează rețeaua</button></form></div>
<div id="seniorMode" hidden><button type="button" class="back-role">← Înapoi</button><div class="subtabs"><button class="active" data-senior-sub="login">Intră în cont</button><button data-senior-sub="activate">Activare</button></div><form id="pinLoginForm" class="form-stack"><h1>Acces Senior</h1><p>Folosește utilizatorul primit de la aparținător și PIN-ul tău.</p><label>Utilizator<input name="user" autocomplete="username" required></label><label>PIN din 4 cifre<input name="pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required></label><button class="primary">Intră în FamilyCare</button></form><form id="activationForm" class="form-stack" hidden><h1>Activează contul</h1><p>Introdu datele primite de la aparținător.</p><label>Telefon<input name="phone" inputmode="tel" required></label><label>Cod beneficiar<input name="beneficiaryCode" required></label><label>Cod de activare<input name="activationCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required></label><button class="primary">Verifică datele</button></form><form id="pinSetupForm" class="form-stack" hidden><h1>Setează PIN-ul</h1><p id="activationUser"></p><label>PIN nou<input name="pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required></label><label>Confirmă PIN-ul<input name="confirmPin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required></label><button class="primary">Salvează PIN-ul și intră</button></form></div><div id="message" class="message"></div></section></main><script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];let activationToken='';function msg(t,ok=false){const e=$('#message');e.textContent=t;e.className='message '+(t?(ok?'ok':'error'):'')}function setRole(r){$('#roleChoice').hidden=true;$('#caregiverMode').hidden=r!=='caregiver';$('#seniorMode').hidden=r!=='senior';msg('')}$$('[data-role]').forEach(b=>b.onclick=()=>setRole(b.dataset.role));$$('.back-role').forEach(b=>b.onclick=()=>location.reload());document.documentElement.dataset.theme=localStorage.getItem('fc-theme')||'light';function rt(){$('#themeBtn').textContent=document.documentElement.dataset.theme==='dark'?'☀':'☾'}rt();$('#themeBtn').onclick=()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('fc-theme',document.documentElement.dataset.theme);rt()};$$('[data-sub]').forEach(b=>b.onclick=()=>{$$('[data-sub]').forEach(x=>x.classList.toggle('active',x===b));$('#caregiverLogin').hidden=b.dataset.sub!=='login';$('#networkSetup').hidden=b.dataset.sub!=='setup'});$$('[data-senior-sub]').forEach(b=>b.onclick=()=>{$$('[data-senior-sub]').forEach(x=>x.classList.toggle('active',x===b));$('#pinLoginForm').hidden=b.dataset.seniorSub!=='login';$('#activationForm').hidden=b.dataset.seniorSub!=='activate';$('#pinSetupForm').hidden=true;msg('')});
const colors=['#2865ed','#168a4a','#e08a00','#c42b38','#7b4ce2','#008b8b','#d15b9f','#52657d'];function addRow(){const d=document.createElement('div');d.className='beneficiary-row';d.innerHTML=`<div class="grid2"><label>Prenume<input data-k="firstName" required></label><label>Nume<input data-k="lastName" required></label></div><div class="grid2"><label>Vârstă<input data-k="age" type="number" min="1" max="120" required></label><label>Telefon<input data-k="phone" required></label></div><label>Culoare<select data-k="cardColor">${colors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></label>`;$('#beneficiaryRows').appendChild(d)}$('#addBeneficiary').onclick=addRow;addRow();
$('#caregiverLogin').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/network/caregiver-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target))) }),j=await r.json();if(!r.ok)return msg(j.error);location.href=j.redirect};$('#networkSetup').onsubmit=async e=>{e.preventDefault();const f=new FormData(e.target),beneficiaries=$$('#beneficiaryRows .beneficiary-row').map(r=>Object.fromEntries([...r.querySelectorAll('[data-k]')].map(x=>[x.dataset.k,x.value]))),caregiver={firstName:f.get('firstName'),lastName:f.get('lastName'),phone:f.get('phone'),user:f.get('user'),password:f.get('password')};const r=await fetch('/api/network/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({caregiver,beneficiaries})}),j=await r.json();if(!r.ok)return msg(j.error);msg('Rețeaua a fost creată. Intră în cont pentru a vedea utilizatorii și codurile de activare.',true)};
$('#pinLoginForm').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/network/pin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target))) }),j=await r.json();if(!r.ok)return msg(j.error);location.href=j.redirect};$('#activationForm').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/network/verify-activation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target))) }),j=await r.json();if(!r.ok)return msg(j.error);activationToken=j.activationToken;$('#activationForm').hidden=true;$('#pinSetupForm').hidden=false;$('#activationUser').textContent=`Utilizatorul tău este: ${j.user}`;msg('Verificare reușită. Confirmă PIN-ul de două ori.',true)};$('#pinSetupForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));const r=await fetch('/api/network/setup-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({activationToken,...data})}),j=await r.json();if(!r.ok)return msg(j.error);location.href=j.redirect};
</script></body></html>
