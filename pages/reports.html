<body><div class="app-shell">
 <aside class="sidebar"><a class="brand" href="company.html"><img src="../assets/logo.svg" alt="FamilyCare"><div><div class="brand-title">FamilyCare</div><div class="brand-subtitle">by Cademix</div><div class="brand-version">v3.0.0</div></div></a><button class="menu-toggle" id="menuToggle" type="button">‹</button><nav class="nav"><a class="" href="dashboard.html"><span class="ico">🏠</span><span>Dashboard</span></a>

 <main class="main"><div class="topbar"><div><div class="eyebrow">ANALIZĂ ȘI DOCUMENTE</div><h1 class="page-title">Rapoarte</h1><p class="page-lead">Filtre pentru familie, cămin, oraș, județ sau rețea națională.</p></div><div class="report-badge"><span>Plan activ</span><b id="planBadge">—</b><small id="planLimits"></small></div></div>
 <section class="section card report-filters"><div class="filter-grid"><label>Raport<select id="reportType"><option value="decisions">Administrare tratamente</option><option value="exceptions">Doze omise / refuzate</option><option value="plan">Plan curent de tratament</option><option value="agenda">Activități și agendă</option><option value="feedback">Sesizări și satisfacție</option><option value="incidents">Incidente și protecție</option></select></label><label>De la<input id="dateFrom" type="date"></label><label>Până la<input id="dateTo" type="date"></label><label>Unitate<select id="unitFilter"><option value="">Toate unitățile</option></select></label><label>Beneficiar<select id="seniorFilter"><option value="">Toți beneficiarii</option></select></label><button class="btn primary" id="applyFilters" type="button">Aplică filtrele</button></div><div class="report-actions"><button class="btn" id="printReport" type="button">Tipărește</button><button class="btn" id="exportCsv" type="button">Export pentru medic (CSV)</button><span id="exportHint" class="muted"></span></div></section>
 <section class="report-kpis"><article><span>Înregistrări</span><b id="metricRows">0</b></article><article><span>Confirmate</span><b id="metricConfirmed">0</b></article><article><span>Necesită atenție</span><b id="metricAttention">0</b></article><article><span>Aderență</span><b id="metricRate">—</b></article></section>
 <section class="section card"><div class="section-head-inline"><div><h2 class="section-title" id="reportTitle">Administrare tratamente</h2><p class="muted" id="reportSubtitle"></p></div><time id="generatedAt"></time></div><div class="report-chart" id="reportChart"></div><div class="table-wrap"><table id="reportTable"><thead></thead><tbody></tbody></table></div></section>
 </main></div>
<script>
const state={entities:[],treatments:[],agenda:[],decisions:[],feedback:[],incidents:[],subscription:{plan:'Basic',features:[]},rows:[]};
const $=id=>document.getElementById(id);const safe=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const payloads=x=>(Array.isArray(x)?x:[]).map(r=>({...r,...(r.payload||{})}));
async function json(url){try{const r=await fetch(url+(url.includes('?')?'&':'?')+'ts='+Date.now());return r.ok?await r.json():[];}catch(_){return[]}}
function iso(d){return d.toISOString().slice(0,10)}function setDates(){const to=new Date(),from=new Date();from.setDate(from.getDate()-30);$('dateFrom').value=iso(from);$('dateTo').value=iso(to)}
async function load(){setDates();const data=await Promise.all([json('/api/entities'),json('/api/treatment'),json('/api/agenda'),json('/api/config/treatment-decisions'),json('/api/config/beneficiary-feedback'),json('/api/config/safeguarding-incidents'),json('/api/subscription/status')]);[state.entities,state.treatments,state.agenda]=data;state.decisions=payloads(data[3]);state.feedback=payloads(data[4]);state.incidents=payloads(data[5]);state.subscription=data[6]||state.subscription;renderFilters();render()}
function renderFilters(){const units=[...new Map(state.entities.map(e=>[e.branch_code||e.branch_name,{code:e.branch_code||e.branch_name,name:e.branch_name||e.branch_code}])).values()].filter(x=>x.code);$('unitFilter').innerHTML='<option value="">Toate unitățile</option>'+units.map(x=>`<option value="${safe(x.code)}">${safe(x.name)}</option>`).join('');$('seniorFilter').innerHTML='<option value="">Toți beneficiarii</option>'+state.entities.map(e=>`<option value="${safe(e.entity_code)}">${safe(e.name)}</option>`).join('');$('planBadge').textContent=state.subscription.plan||'Basic';$('planLimits').textContent=state.subscription.maxPatients===null?'Beneficiari nelimitați':`Max. ${state.subscription.maxPatients||2} beneficiari`;const allowed=(state.subscription.features||[]).includes('doctor-export');$('exportCsv').disabled=!allowed;$('exportHint').textContent=allowed?'':'Exportul pentru medic necesită planul Premium sau Unlimited.'}
function dateOk(value){if(!value)return true;const d=String(value).slice(0,10);return d>= $('dateFrom').value&&d<= $('dateTo').value}function entityOk(code,name){const unit=$('unitFilter').value,senior=$('seniorFilter').value;const e=state.entities.find(x=>x.entity_code===code||x.name===name);return(!unit||e?.branch_code===unit||e?.branch_name===unit)&&(!senior||e?.entity_code===senior)}
function rowsForType(){const t=$('reportType').value;if(t==='decisions'||t==='exceptions')return state.decisions.map(x=>({date:x['Înregistrat la']||x.ConfirmatLa||'',senior:x.Senior||x.Beneficiar||'',code:x['Cod entitate']||'',subject:x.Tratament||'',status:x.Decizie||'Administrat / efectuat',details:x.Motiv||'',time:x['Ora planificată']||x.Ora||''})).filter(x=>dateOk(x.date)&&entityOk(x.code,x.senior)&&(t!=='exceptions'||!/administrat|efectuat|confirm/i.test(x.status)));if(t==='plan')return state.treatments.map(x=>({date:x.start_date||'',senior:x.entity_name||'',code:x.entity_code||'',subject:x.title||'',status:x.status||'activ',details:x.description||'',time:String(x.start_time||'').slice(0,5)})).filter(x=>entityOk(x.code,x.senior));if(t==='agenda')return state.agenda.map(x=>({date:x.start_date||'',senior:x.entity_name||'',code:x.entity_code||'',subject:x.title||'',status:x.status||'activ',details:x.description||'',time:String(x.start_time||'').slice(0,5)})).filter(x=>entityOk(x.code,x.senior));if(t==='feedback')return state.feedback.map(x=>({date:x.Data||'',senior:x.Beneficiar||'Anonim',code:x['Cod entitate']||'',subject:x.Tip||'',status:x.Status||'',details:x.Mesaj||'',time:x.Scor?`Scor ${x.Scor}/5`:''})).filter(x=>dateOk(x.date)&&entityOk(x.code,x.senior));return state.incidents.map(x=>({date:x.Data||x['Data incident']||'',senior:x.Beneficiar||x.Senior||'',code:x['Cod entitate']||'',subject:x.Tip||x.Incident||'',status:x.Status||'',details:x.Detalii||x.Măsuri||'',time:''})).filter(x=>dateOk(x.date)&&entityOk(x.code,x.senior))}
function render(){state.rows=rowsForType().sort((a,b)=>String(b.date).localeCompare(String(a.date)));const titles={decisions:'Administrare tratamente',exceptions:'Doze omise / refuzate',plan:'Plan curent de tratament',agenda:'Activități și agendă',feedback:'Sesizări și satisfacție',incidents:'Incidente și protecție'};$('reportTitle').textContent=titles[$('reportType').value];$('reportSubtitle').textContent=`Perioada ${$('dateFrom').value} – ${$('dateTo').value}`;$('generatedAt').textContent='Generat '+new Date().toLocaleString('ro-RO');const ok=state.rows.filter(x=>/administrat|efectuat|confirm/i.test(x.status)).length,attention=state.rows.filter(x=>/omis|refuz|deschis|nou|urgent/i.test(x.status)).length;$('metricRows').textContent=state.rows.length;$('metricConfirmed').textContent=ok;$('metricAttention').textContent=attention;$('metricRate').textContent=(ok+attention)?Math.round(ok/(ok+attention)*100)+'%':'—';const by=new Map();state.rows.forEach(x=>{const k=x.senior||'Fără beneficiar';by.set(k,(by.get(k)||0)+1)});const max=Math.max(1,...by.values());$('reportChart').innerHTML=[...by.entries()].slice(0,12).map(([n,v])=>`<div><span>${safe(n)}</span><i style="width:${Math.round(v/max*100)}%"></i><b>${v}</b></div>`).join('');const cols=['Data','Ora','Beneficiar','Subiect','Status','Detalii'];$('reportTable').querySelector('thead').innerHTML='<tr>'+cols.map(x=>'<th>'+x+'</th>').join('')+'</tr>';$('reportTable').querySelector('tbody').innerHTML=state.rows.length?state.rows.map(x=>`<tr><td>${safe(String(x.date).slice(0,10))}</td><td>${safe(x.time)}</td><td>${safe(x.senior)}</td><td>${safe(x.subject)}</td><td>${safe(x.status)}</td><td>${safe(x.details)}</td></tr>`).join(''):'<tr><td colspan="6">Nu există date pentru filtrele alese.</td></tr>'}
function exportCsv(){if($('exportCsv').disabled)return;const rows=[['Data','Ora','Beneficiar','Subiect','Status','Detalii'],...state.rows.map(x=>[String(x.date).slice(0,10),x.time,x.senior,x.subject,x.status,x.details])];const csv='\ufeff'+rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\r\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='FamilyCare_raport_'+iso(new Date())+'.csv';a.click();URL.revokeObjectURL(a.href)}
$('applyFilters').onclick=render;$('reportType').onchange=render;$('printReport').onclick=()=>print();$('exportCsv').onclick=exportCsv;load();
</script></body></html>
