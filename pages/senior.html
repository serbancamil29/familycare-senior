<!doctype html>
<html lang="ro">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
 <meta name="theme-color" content="#2563EB"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default">
 <link rel="manifest" href="../manifest.webmanifest"><link rel="apple-touch-icon" href="../assets/icon-192.png"><script defer src="../app-universal.js"></script>
 <title>Ecran senior - FamilyCare</title>
 <script>(function(){try{if(localStorage.getItem('familycare-theme')==='dark')document.documentElement.classList.add('dark-theme');}catch(e){}})();</script>
 <link rel="stylesheet" href="../styles/common.css">
 <link rel="stylesheet" href="../styles/senior-kiosk.css">
</head>
<body class="senior-kiosk-body senior-standalone">
 <main class="kiosk-page">
  <header class="kiosk-top">
   <div class="kiosk-brand"><img src="../assets/logo.svg" alt="FamilyCare"><div><b>FamilyCare</b><span>by Cademix · v1.0.64</span></div></div>
   <div class="kiosk-actions-top clean-top-actions sound-top-actions">
     <button id="logoutBtn" type="button">Ieșire</button>
     <button id="themeBtn" type="button">Dark</button>
     <button id="languageBtn" type="button">RO</button>
     <select id="soundType" class="sound-select" aria-label="Tip sunet">
      <option value="soft">Sunet blând</option>
      <option value="bell">Clopoțel</option>
      <option value="alert">Alertă</option>
     </select>
     <label class="sound-volume" aria-label="Volum sunet"><span>Volum</span><input id="soundVolume" type="range" min="0" max="100" value="70"></label>
     <div class="kiosk-now" id="currentNow">Azi · --:--</div>
    </div>
  </header>

  <section class="senior-cards" id="seniorCards" aria-label="Seniori"></section>
  <section class="day-cards-kiosk" id="dayCards" aria-label="Zile"></section>

  <section class="next-strip">
   <div class="strip-title"><b id="nextTitle">Program</b><div class="strip-actions"><span>ordine crescătoare</span><button id="collapseTreatments" class="strip-toggle" type="button" aria-expanded="true">Restrânge</button></div></div>
   <div class="next-treatment-cards" id="nextTreatments"></div>
  </section>

  <section class="confirm-row">
   <button id="confirmTreatment" class="confirm-treatment-card confirm-multi-card" type="button" aria-label="Confirmare">
    <div class="confirm-multi-head visually-hidden-confirm" aria-hidden="true"></div>
    <div class="confirm-zones" id="confirmZones"></div>
   </button>
  </section>

  <section class="kiosk-actions">
   <button type="button" class="kiosk-action call" data-action="call"><span>☎</span><b>Sună familia</b><small>Contact principal</small></button>
   <button type="button" class="kiosk-action message" data-action="message"><span>✎</span><b>Trimite mesaj</b><small>Mesaj vocal sau text</small></button>
   <button type="button" class="kiosk-action help" data-action="help"><span>!</span><b>Am nevoie de ajutor</b><small>Trimite alertă</small></button>
  </section>

  <div id="contactActionModal" class="contact-action-modal" aria-hidden="true">
   <div class="contact-action-card" role="dialog" aria-modal="true" aria-labelledby="contactActionTitle">
    <div class="contact-action-head">
     <div>
      <span class="contact-action-kicker" id="contactActionKicker">Contact familie</span>
      <h2 id="contactActionTitle">Sună familia</h2>
     </div>
     <button type="button" class="contact-action-close" id="contactActionClose">Închide</button>
    </div>
    <div class="contact-action-body">
     <section class="contact-choice-panel">
      <h3>Alege numărul</h3>
      <div id="contactChoices" class="contact-choices"></div>
     </section>
     <section class="dial-panel">
      <h3>Alt număr</h3>
      <input id="dialNumber" class="dial-number" inputmode="tel" autocomplete="off" placeholder="Introdu număr" />
      <div class="dial-grid" id="dialGrid">
       <button type="button">1</button><button type="button">2</button><button type="button">3</button>
       <button type="button">4</button><button type="button">5</button><button type="button">6</button>
       <button type="button">7</button><button type="button">8</button><button type="button">9</button>
       <button type="button">+</button><button type="button">0</button><button type="button" data-key="back">⌫</button>
      </div>
     </section>
     <section class="message-compose-panel" id="messageComposePanel" hidden>
      <h3>Mesaj</h3>
      <textarea id="messageText" class="message-text" rows="4" autocomplete="off" placeholder="Scrie mesajul aici"></textarea>
      <div class="message-quick">
       <button type="button" data-msg="Te rog să mă contactezi.">Contactează-mă</button>
       <button type="button" data-msg="Am nevoie de ajutor. Te rog să mă contactezi.">Ajutor</button>
       <button type="button" data-msg="Am luat tratamentul.">Am luat tratamentul</button>
      </div>
      <div class="alpha-grid" id="alphaGrid" aria-label="Tastatură text">
       <button type="button">A</button><button type="button">B</button><button type="button">C</button><button type="button">D</button><button type="button">E</button><button type="button">F</button>
       <button type="button">G</button><button type="button">H</button><button type="button">I</button><button type="button">J</button><button type="button">K</button><button type="button">L</button>
       <button type="button">M</button><button type="button">N</button><button type="button">O</button><button type="button">P</button><button type="button">R</button><button type="button">S</button>
       <button type="button">T</button><button type="button">U</button><button type="button">V</button><button type="button">Z</button><button type="button" data-key="space">Spațiu</button><button type="button" data-key="back">⌫</button>
      </div>
     </section>
    </div>
    <div class="contact-action-foot">
     <button type="button" class="contact-action-main" id="contactActionMain">Continuă</button>
    </div>
   </div>
  </div>
  <div id="toast" class="kiosk-toast"></div>
 </main>
<script>
const SESSION_KEY='familycare-senior-session';
let session={headerCode:'CH-RO-0001', branchCode:'CB-0001', branchName:'Părinții mei'};
const nativeFetch=window.fetch.bind(window);
async function apiFetch(url,options={}){const headers=new Headers(options.headers||{});if(session.token)headers.set('Authorization','Bearer '+session.token);const response=await nativeFetch(url,{...options,headers});if(response.status===401){localStorage.removeItem(SESSION_KEY);window.location.replace('senior-login.html');throw new Error('Sesiune expirată');}return response;}
let allEntities=[], allTreatments=[], selectedEntityCode='', selectedDay=jsWeekday(new Date()), currentTreatment=null;
let familyContact={Nume:'Contact familie',Telefon:'0700000000',Email:'contact@example.com','Mesaj implicit':'Am nevoie de ajutor. Te rog să mă contactezi.'};
const CONFIRMED_KEY='familycare-senior-confirmed-occurrences';
let confirmedKeys=loadConfirmedKeys(), audioCtx=null, alarmTimer=null, soundAllowed=false;
let soundSettings=loadSoundSettings();
let treatmentsCollapsed=false;
const FALLBACK_ENTITIES=[
 {entity_code:'ME-0001', name:'Maria Popescu', entity_type:'senioră', branch_code:'CB-0001', branch_name:'Părinții mei', card_color:'#2563EB', card_text_color:'#FFFFFF'},
 {entity_code:'ME-0003', name:'Ion Popescu', entity_type:'senior', branch_code:'CB-0001', branch_name:'Părinții mei', card_color:'#0F766E', card_text_color:'#FFFFFF'}
];
const CARD_PALETTE=['#2563EB','#0F766E','#7C3AED','#C2410C','#BE123C','#0369A1'];
function safe(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function validCardColor(value,fallback){const color=String(value||'').trim();return /^#[0-9a-f]{6}$/i.test(color)?color:fallback;}
function pad(n){return String(n).padStart(2,'0');}
function jsWeekday(d){const n=d.getDay();return n===0?7:n;}
function parseTime(t){const [h,m]=String(t||'09:00').slice(0,5).split(':').map(Number);return {h:h||0,m:m||0};}
function dateOnly(s){if(!s)return null; const d=new Date(String(s).slice(0,10)+'T00:00:00'); return isNaN(d)?null:d;}
function dayName(n){return ['','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'][n]||'';}
function isSenior(e){return /senior|senioră|seniora/i.test(String(e.entity_type||''));}
function branchMatches(e){return !session.branchCode || e.branch_code===session.branchCode || e.branch_name===session.branchName || !e.branch_code;}
function startOfWeek(d){const copy=new Date(d.getFullYear(),d.getMonth(),d.getDate()); copy.setDate(copy.getDate()-(jsWeekday(copy)-1)); return copy;}
function dateForWeekday(n){const d=startOfWeek(new Date()); d.setDate(d.getDate()+Number(n)-1); return d;}
function timeText(t){return String(t||'').slice(0,5)||'--:--';}

function loadConfirmedKeys(){try{return new Set(JSON.parse(localStorage.getItem(CONFIRMED_KEY)||'[]').filter(x=>typeof x==='string'));}catch(e){return new Set();}}
function saveConfirmedKeys(){try{localStorage.setItem(CONFIRMED_KEY, JSON.stringify([...confirmedKeys].slice(-800)));}catch(e){}}
function loadSoundSettings(){try{return {...{type:'soft',volume:70},...JSON.parse(localStorage.getItem('familycare-sound-settings')||'{}')}}catch(e){return {type:'soft',volume:70}}}
function saveSoundSettings(){try{localStorage.setItem('familycare-sound-settings',JSON.stringify(soundSettings));}catch(e){}}
function initSoundControls(){const type=document.getElementById('soundType');const vol=document.getElementById('soundVolume');if(type){type.value=soundSettings.type||'soft';type.onchange=()=>{soundSettings.type=type.value;saveSoundSettings();playAlarmSound(true);};}if(vol){vol.value=String(soundSettings.volume??70);vol.oninput=()=>{soundSettings.volume=Number(vol.value)||0;saveSoundSettings();};vol.onchange=()=>playAlarmSound(true);}}

function keyFromTarget(t,target){const d=target||t.target||new Date();return `${t.entity_code||''}|${t.id||t.title||''}|${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function isAlreadyConfirmed(t){const status=String(t.status||'').toLowerCase(); if(t.confirmed_at||status.includes('confirmat')||status.includes('confirmed'))return true; return confirmedKeys.has(t.occurrence_key||keyFromTarget(t,t.target));}
function severityClass(diff){if(diff<=0)return 'state-overdue'; if(diff<=5)return 'state-05'; if(diff<=10)return 'state-10'; if(diff<=20)return 'state-20'; if(diff<=30)return 'state-30'; return 'state-calm';}
function clearSeverity(el){if(!el)return; el.classList.remove('state-calm','state-30','state-20','state-10','state-05','state-overdue','soon','urgent','alarm');}
function updateClock(){const d=new Date(); const el=document.getElementById('currentNow'); if(el) el.textContent=`${dayName(jsWeekday(d))}, ${d.toLocaleDateString('ro-RO')} · ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function initSession(){try{session={...session,...JSON.parse(localStorage.getItem(SESSION_KEY)||'{}')}}catch(e){} if(!session.token||Number(session.expiresAt||0)<Date.now()){localStorage.removeItem(SESSION_KEY);window.location.replace('senior-login.html');return false} updateClock(); setInterval(updateClock,30000);return true;}
function selectedEntityName(){const e=allEntities.find(x=>x.entity_code===selectedEntityCode);return e?e.name:'';}
function mergeEntities(db){const byCode=new Map(); [...FALLBACK_ENTITIES, ...(Array.isArray(db)?db:[])].forEach(e=>{if(e&&e.entity_code&&isSenior(e)&&branchMatches(e)) byCode.set(e.entity_code, {...(byCode.get(e.entity_code)||{}), ...e});}); return [...byCode.values()];}
async function loadEntities(){let items=[]; try{const r=await apiFetch('/api/senior/entities?branchCode='+encodeURIComponent(session.branchCode)+'&ts='+Date.now()); if(r.ok) items=await r.json();}catch(e){} allEntities=mergeEntities(items); if(!allEntities.some(e=>e.entity_code===selectedEntityCode)) selectedEntityCode=(allEntities[0]&&allEntities[0].entity_code)||''; renderSeniorCards();}
function renderSeniorCards(){const box=document.getElementById('seniorCards'); const page=document.querySelector('.kiosk-page'); const count=allEntities.length; const phoneRows=Math.max(1,Math.ceil(count/2)); box.dataset.count=String(count); if(page){page.classList.toggle('many-seniors',count>4);page.dataset.seniorCount=String(count);page.style.setProperty('--senior-cards-height',(phoneRows*44+(phoneRows-1)*4)+'px');page.style.setProperty('--confirm-columns',String(Math.min(2,Math.max(1,count))));} box.innerHTML=allEntities.map((e,index)=>{const background=validCardColor(e.card_color,CARD_PALETTE[index%CARD_PALETTE.length]);const text=validCardColor(e.card_text_color,'#FFFFFF');const active=e.entity_code===selectedEntityCode;return `<button type="button" class="senior-person-card ${active?'active':''}" data-code="${safe(e.entity_code)}" aria-pressed="${active?'true':'false'}" style="--senior-card-bg:${background};--senior-card-text:${text}"><b>${safe(e.name)}</b><span>${safe(e.entity_type)}</span></button>`;}).join(''); box.querySelectorAll('button').forEach(b=>b.onclick=()=>{
  selectedEntityCode=b.dataset.code;
  currentTreatment=null;
  renderSeniorCards();
  renderTreatments();
  if(document.activeElement) document.activeElement.blur();
  setTimeout(()=>focusConfirmZone(selectedEntityCode),40);
 });}
function renderDayCards(){const today=jsWeekday(new Date()); document.getElementById('dayCards').innerHTML=[1,2,3,4,5,6,7].map(n=>{const d=dateForWeekday(n); return `<button type="button" class="kiosk-day ${n===selectedDay?'active':''}" data-day="${n}"><b>${dayName(n)}</b><span>${n===today?'astăzi · ':''}${pad(d.getDate())}.${pad(d.getMonth()+1)}</span></button>`;}).join(''); document.querySelectorAll('.kiosk-day').forEach(btn=>btn.onclick=()=>{selectedDay=Number(btn.dataset.day); renderDayCards(); renderTreatments();});}
function focusConfirmZone(entityCode){document.querySelectorAll('.confirm-zone').forEach(z=>z.classList.toggle('selected-senior', z.dataset.entity===entityCode)); const z=document.querySelector(`.confirm-zone[data-entity="${CSS.escape(entityCode||'')}"]`); if(z){z.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});}}
function fallbackTreatments(){const now=new Date(); const t1=new Date(now.getTime()+7*60000); const t2=new Date(now.getTime()+26*60000); return [
 {id:'demo-maria',entity_code:'ME-0001',entity_name:'Maria Popescu',title:'Furazolidon',description:'1 comprimat',start_date:now.toISOString().slice(0,10),end_date:'2026-12-31',start_time:t1.toTimeString().slice(0,5),recurrence_rule:'daily',active_weekdays:'1,2,3,4,5,6,7'},
 {id:'demo-ion',entity_code:'ME-0003',entity_name:'Ion Popescu',title:'Pastila de tensiune',description:'1 comprimat',start_date:now.toISOString().slice(0,10),end_date:'2026-12-31',start_time:t2.toTimeString().slice(0,5),recurrence_rule:'daily',active_weekdays:'1,2,3,4,5,6,7'}
];}
async function loadTreatments(){let list=[]; try{const r=await apiFetch('/api/treatment?ts='+Date.now()); if(r.ok) list=await r.json();}catch(e){} allTreatments=Array.isArray(list)&&list.length?list:fallbackTreatments(); renderTreatments();}
function isValidForDate(item,d){const start=dateOnly(item.start_date)||new Date(d.getFullYear(),d.getMonth(),d.getDate()); const end=dateOnly(item.end_date); const day=new Date(d.getFullYear(),d.getMonth(),d.getDate()); if(day<start || (end&&day>end)) return false; const rule=item.recurrence_rule||'selected_weekdays'; const days=String(item.active_weekdays||'').split(',').map(Number).filter(Boolean); const every=Math.max(1,Number(item.repeat_every_days||1)); if(rule==='daily')return true; if(rule==='once')return day.toDateString()===start.toDateString(); if(rule==='every_x_days')return Math.floor((day-start)/86400000)%every===0; if(rule==='weekly')return jsWeekday(day)===jsWeekday(start); return !days.length||days.includes(jsWeekday(day));}
function occurrenceForDay(item,dayNo){const base=dateForWeekday(dayNo); if(!isValidForDate(item,base)) return null; const {h,m}=parseTime(item.start_time); const target=new Date(base); target.setHours(h,m,0,0); const diff=Math.round((target-new Date())/60000); return {target,diff};}

function treatmentItemsForEntityDay(entityCode,dayNo=selectedDay){
 const items=(allTreatments||[])
  .filter(t=>String(t.entity_code||'')===String(entityCode||''))
  .map(t=>({...t,occ:occurrenceForDay(t,dayNo)}))
  .filter(t=>t.occ)
  .map(t=>{const full={...t,diff:t.occ.diff,target:t.occ.target}; full.occurrence_key=keyFromTarget(full, full.target); return full;})
  .filter(t=>!isAlreadyConfirmed(t))
  .sort((a,b)=>a.target-b.target);
 return items;
}
function nextTreatmentForEntity(e){let candidates=[]; for(let i=0;i<7;i++){let day=jsWeekday(new Date())+i; while(day>7)day-=7; candidates.push(...treatmentItemsForEntityDay(e.entity_code,day));} return candidates.sort((a,b)=>a.target-b.target)[0]||null;}
function scheduleLabel(t){
 const d=t&&t.target?new Date(t.target):null;
 if(!d||isNaN(d)) return '';
 const now=new Date();
 const diff=Number(t.diff||0);
 const hhmm=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
 if(diff<0) return `întârziat · ${hhmm}`;
 if(diff<=360) return hhmm;
 return `${pad(d.getDate())}.${pad(d.getMonth()+1)} · ${hhmm}`;
}
function diffLabel(diff){
 const d=new Date(Date.now()+Number(diff||0)*60000);
 const hhmm=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
 if(Number(diff)<0)return `întârziat · ${hhmm}`;
 if(Number(diff)<=360)return hhmm;
 return `${pad(d.getDate())}.${pad(d.getMonth()+1)} · ${hhmm}`;
}
function canConfirmOccurrence(t){
 return !!t && Number(t.diff) <= 30;
}
function confirmBlockMessage(t){
 if(!t) return 'Nu există task de confirmat.';
 return 'Confirmarea este disponibilă cu 30 de minute înainte sau după ora programată.';
}

function hasAnyTaskForDay(dayNo=selectedDay){
 return allEntities.some(e=>treatmentItemsForEntityDay(e.entity_code, dayNo).length>0);
}
function setTreatmentsCollapsed(collapsed, automatic=false){
 treatmentsCollapsed=!!collapsed;
 const strip=document.querySelector('.next-strip');
 const page=document.querySelector('.kiosk-page');
 const btn=document.getElementById('collapseTreatments');
 if(strip) strip.classList.toggle('collapsed',treatmentsCollapsed);
 if(page) page.classList.toggle('treatments-collapsed',treatmentsCollapsed);
 if(btn){btn.textContent=treatmentsCollapsed?'Arată':'Restrânge';btn.setAttribute('aria-expanded',String(!treatmentsCollapsed));}
}
function renderTreatments(){
 const selected=allEntities.find(e=>e.entity_code===selectedEntityCode);
 const titleEl=document.getElementById('nextTitle');
 const selectedDayName=dayName(selectedDay);
 if(titleEl) titleEl.textContent=selected?`Program ${selectedDayName} · ${selected.name}`:`Program ${selectedDayName}`;
 const items=treatmentItemsForEntityDay(selectedEntityCode,selectedDay);
 const wrap=document.getElementById('nextTreatments');
 wrap.innerHTML=items.length?items.slice(0,6).map(t=>`<button type="button" class="kiosk-treatment ${severityClass(t.diff)}" data-id="${safe(t.id)}" data-key="${safe(t.occurrence_key)}" title="${safe(t.title)}"><span class="program-line"><b>${timeText(t.start_time)}</b><i aria-hidden="true">-</i><strong>${safe(t.title)}</strong></span></button>`).join(''):`<div class="kiosk-empty">Fără taskuri azi</div>`;
 wrap.querySelectorAll('.kiosk-treatment').forEach(b=>b.onclick=()=>{currentTreatment=items.find(x=>String(x.occurrence_key)===String(b.dataset.key)); renderConfirmZones();});
 // Programul pe zile rămâne vizibil implicit; se restrânge doar manual.
 renderConfirmZones();
 updateAlarm();
}


function nextCandidateForEntity(e){return treatmentItemsForEntityDay(e.entity_code, selectedDay)[0]||null;}
function alertScore(t){if(!t)return 999999;return Math.abs(Number(t.diff||0));}
function nearestCandidate(){return allEntities.map(nextCandidateForEntity).filter(Boolean).sort((a,b)=>alertScore(a)-alertScore(b))[0]||null;}
function isCritical(t){return !!t && Number(t.diff)<=10;}
function renderConfirmZones(){
 const box=document.getElementById('confirmZones');
 const nearest=nearestCandidate();
 const nearestKey=nearest?String(nearest.occurrence_key||nearest.id):'';
 const zones=allEntities.map((e,entityIndex)=>{
  const dayItems=treatmentItemsForEntityDay(e.entity_code, selectedDay).slice(0,3);
  const first=dayItems[0] || null;
  const firstKey=first?String(first.occurrence_key||first.id):'';
  const active=e.entity_code===selectedEntityCode;
  const isNearest=first&&firstKey===nearestKey;
  const critical=isNearest&&isCritical(first);
  const state=first?severityClass(first.diff):'empty';
  const list=dayItems.length?dayItems.map((t,idx)=>`<div class="confirm-treatment-line ${idx===0?'first':'next'} ${canConfirmOccurrence(t)?'can-confirm':'locked'}"><span class="treat-icon" aria-hidden="true">✦</span><strong>${safe(t.title)}</strong><small>${scheduleLabel(t)}</small></div>`).join(''):`<div class="confirm-treatment-line first empty-line"><strong>Fără taskuri azi</strong><small>Zi liberă</small></div>`;
  const confirmable=first&&canConfirmOccurrence(first);
   const zoneBackground=validCardColor(e.card_color,CARD_PALETTE[entityIndex%CARD_PALETTE.length]);
   const zoneText=validCardColor(e.card_text_color,'#FFFFFF');
   return `<div class="confirm-zone ${state} ${active?'selected-senior':''} ${isNearest?'nearest-alert':''} ${critical?'nearest-critical':''} ${confirmable?'confirmable':'locked-confirm'}" data-entity="${safe(e.entity_code)}" data-key="${safe(first?first.occurrence_key:'')}" style="--confirm-zone-bg:${zoneBackground};--confirm-zone-text:${zoneText}"><div class="confirm-zone-name">${safe(e.name)}</div><div class="confirm-treatment-list">${list}</div></div>`;
 }).join('');
 box.innerHTML=zones;
 focusConfirmZone(selectedEntityCode);
 box.querySelectorAll('.confirm-zone').forEach(z=>z.onclick=(ev)=>{
  ev.stopPropagation();
  const key=z.dataset.key;
  selectedEntityCode=z.dataset.entity||selectedEntityCode;
  renderSeniorCards();
  focusConfirmZone(selectedEntityCode);
  if(key){
   const entity=allEntities.find(e=>e.entity_code===z.dataset.entity);
   const dayFirst=entity?treatmentItemsForEntityDay(entity.entity_code, selectedDay)[0]:null;
   const t=dayFirst || null;
   if(t&&String(t.occurrence_key)===String(key)){
    if(!canConfirmOccurrence(t)){toast(confirmBlockMessage(t)); return;}
    currentTreatment=t;
    confirmCurrentTreatment();
   }
  }
 });
 currentTreatment=currentTreatment&&!isAlreadyConfirmed(currentTreatment)?currentTreatment:(nearest||null);
}


function updateAlarm(){
 const card=document.getElementById('confirmTreatment');
 const nearest=nearestCandidate();
 const diff=nearest?nearest.diff:9999;
 clearSeverity(card);
 card.classList.remove('has-nearest-critical','has-nearest-warning');
 if(nearest) card.classList.add(severityClass(diff));
 if(diff<=30) card.classList.add('has-nearest-warning');
 if(diff<=10){card.classList.add('has-nearest-critical');} if(diff<=5){card.classList.add('alarm'); startAlarm();} else stopAlarm();
}


async function confirmCurrentTreatment(){
 const t=currentTreatment||allEntities.map(nextTreatmentForEntity).filter(Boolean).sort((a,b)=>a.target-b.target)[0];
 if(!t){toast('Nu există tratament de confirmat.');return;}
 if(!canConfirmOccurrence(t)){toast(confirmBlockMessage(t));return;}
 const key=t.occurrence_key||keyFromTarget(t,t.target);
 confirmedKeys.add(key);
 saveConfirmedKeys();
 stopAlarm();
 toast(`${t.entity_name||selectedEntityName()}: ${t.title} confirmat`);
 try{
  await apiFetch('/api/treatment/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({treatmentId:t.id,title:t.title,entityName:t.entity_name||selectedEntityName(),startTime:timeText(t.start_time),occurrenceKey:key,emailRecipients:t.email_recipients,emailOnFinish:t.email_on_finish})});
 }catch(e){}
 logQuickAction('confirm-treatment',`${t.entity_name||''} - ${t.title} - ${timeText(t.start_time)}`);
 currentTreatment=null;
 renderTreatments();
}
function cleanPhone(p){return String(p||'').replace(/[^+0-9]/g,'');}
async function loadFamilyContact(){try{const r=await apiFetch('/api/family-contact?ts='+Date.now()); if(r.ok)familyContact=await r.json();}catch(e){}}
async function logQuickAction(action,message){try{await apiFetch('/api/quick-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,entityName:selectedEntityName(),message})});}catch(e){}}
function toast(msg){const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200);}
function startAlarm(){if(alarmTimer||!soundAllowed)return; alarmTimer=setInterval(()=>playAlarmSound(false),1800); playAlarmSound(false);}
function stopAlarm(){if(alarmTimer){clearInterval(alarmTimer); alarmTimer=null;}}
function tone(freq,start,duration,gain){const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime+start);g.gain.setValueAtTime(gain,audioCtx.currentTime+start);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+start+duration);o.connect(g);g.connect(audioCtx.destination);o.start(audioCtx.currentTime+start);o.stop(audioCtx.currentTime+start+duration);}
function playAlarmSound(preview){try{soundAllowed=true;audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const volume=Math.max(0,Math.min(100,Number(soundSettings.volume??70)))/100; if(volume<=0)return; const gain=.16*volume; const type=soundSettings.type||'soft'; if(type==='bell'){tone(784,0,.18,gain);tone(988,.20,.20,gain*.9);} else if(type==='alert'){tone(880,0,.12,gain);tone(660,.16,.12,gain);tone(880,.32,.12,gain);} else {tone(740,0,.16,gain*.8);} }catch(e){}}

document.addEventListener('click',()=>{soundAllowed=true;},{once:true});
document.getElementById('confirmTreatment').onclick=confirmCurrentTreatment;

let pendingContactAction='call';
function contactList(){
 const fc=familyContact||{};
 const raw=Array.isArray(fc.Contacte)?fc.Contacte:[];
 const built=[
  {Etichetă:'Principal', Nume:fc['Nume principal']||fc.Nume||'Contact principal', Telefon:fc['Telefon principal']||fc.Telefon},
  {Etichetă:'Secundar', Nume:fc['Nume secundar']||'Contact secundar', Telefon:fc['Telefon secundar']},
  {Etichetă:'Al treilea', Nume:fc['Nume al treilea']||'Contact rezervă', Telefon:fc['Telefon al treilea']||fc['Telefon urgență']}
 ];
 const merged=[...raw,...built].filter(c=>cleanPhone(c.Telefon));
 const seen=new Set();
 return merged.filter(c=>{const p=cleanPhone(c.Telefon); if(seen.has(p)) return false; seen.add(p); c.Telefon=p; return true;});
}
function actionLabel(action){return action==='call'?'Sună familia':(action==='message'?'Trimite mesaj':'Am nevoie de ajutor');}
function defaultBody(action){return action==='help'?(familyContact['Mesaj ajutor']||familyContact['Mesaj implicit']||'Am nevoie de ajutor. Te rog să mă contactezi.'):(familyContact['Mesaj SMS']||'Te rog să mă contactezi.');}
function openContactAction(action){
 pendingContactAction=action; soundAllowed=true;
 const modal=document.getElementById('contactActionModal');
 const card=modal.querySelector('.contact-action-card');
 const choices=document.getElementById('contactChoices');
 const messagePanel=document.getElementById('messageComposePanel');
 const messageText=document.getElementById('messageText');
 const list=contactList();
 const needsMessage=action==='message'||action==='help';
 card.classList.toggle('with-message', needsMessage);
 card.classList.toggle('no-message', !needsMessage);
 if(messagePanel) messagePanel.hidden=!needsMessage;
 if(messageText) messageText.value=needsMessage?defaultBody(action):'';
 document.getElementById('contactActionTitle').textContent=actionLabel(action);
 document.getElementById('contactActionKicker').textContent=action==='call'?'Alege contactul pentru apel':(action==='message'?'Alege contactul și scrie mesajul':'Alege contactul pentru alertă');
 document.getElementById('contactActionMain').textContent=action==='call'?'Apelează':(action==='message'?'Trimite mesaj':'Trimite alertă');
 choices.innerHTML=list.length?list.map((c,i)=>`<button type="button" class="contact-choice ${i===0?'active':''}" data-phone="${safe(c.Telefon)}"><b>${safe(c.Etichetă||('Contact '+(i+1)))}</b><span>${safe(c.Nume||'Contact')}</span><strong>${safe(c.Telefon)}</strong></button>`).join(''):'<div class="contact-missing">Nu există numere configurate.</div>';
 const first=list[0]&&list[0].Telefon||'';
 document.getElementById('dialNumber').value=first;
 choices.querySelectorAll('.contact-choice').forEach(btn=>btn.onclick=()=>{choices.querySelectorAll('.contact-choice').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.getElementById('dialNumber').value=btn.dataset.phone||'';});
 modal.classList.add('show'); modal.setAttribute('aria-hidden','false');
 if(needsMessage && messageText) setTimeout(()=>messageText.focus(),120);
}
function closeContactAction(){const modal=document.getElementById('contactActionModal'); modal.classList.remove('show'); modal.setAttribute('aria-hidden','true');}
function runContactAction(){
 const phone=cleanPhone(document.getElementById('dialNumber').value);
 if(!phone){toast('Alege sau introdu un număr.');return;}
 const action=pendingContactAction;
 const bodyEl=document.getElementById('messageText');
 const msg=(bodyEl&&bodyEl.value.trim())?bodyEl.value.trim():defaultBody(action);
 logQuickAction(action, actionLabel(action)+' · '+phone+(action==='call'?'':' · '+msg));
 if(action==='call') location.href='tel:'+phone;
 else location.href='sms:'+phone+'?&body='+encodeURIComponent(msg);
 toast(action==='help'?'Alertă pregătită.':'Acțiune pregătită.');
 closeContactAction();
}
document.querySelectorAll('.kiosk-action').forEach(btn=>btn.onclick=()=>openContactAction(btn.dataset.action));
const closeContactBtn=document.getElementById('contactActionClose'); if(closeContactBtn) closeContactBtn.onclick=closeContactAction;
const runContactBtn=document.getElementById('contactActionMain'); if(runContactBtn) runContactBtn.onclick=runContactAction;
const contactModal=document.getElementById('contactActionModal'); if(contactModal) contactModal.addEventListener('click',e=>{if(e.target===contactModal)closeContactAction();});
const dialGrid=document.getElementById('dialGrid'); if(dialGrid) dialGrid.addEventListener('click',e=>{const b=e.target.closest('button'); if(!b)return; const input=document.getElementById('dialNumber'); const key=b.dataset.key||b.textContent.trim(); if(key==='back')input.value=input.value.slice(0,-1); else input.value+=key;});
const alphaGrid=document.getElementById('alphaGrid'); if(alphaGrid) alphaGrid.addEventListener('click',e=>{const b=e.target.closest('button'); if(!b)return; const input=document.getElementById('messageText'); if(!input)return; const key=b.dataset.key||b.textContent.trim(); if(key==='back')input.value=input.value.slice(0,-1); else if(key==='space')input.value+=' '; else input.value+=key.toLowerCase(); input.focus();});
document.querySelectorAll('.message-quick button').forEach(btn=>btn.onclick=()=>{const input=document.getElementById('messageText'); if(input){input.value=btn.dataset.msg||btn.textContent.trim(); input.focus();}});

document.getElementById('themeBtn').onclick=()=>{const isDark=document.documentElement.classList.toggle('dark-theme'); document.body.classList.toggle('dark-theme',isDark); localStorage.setItem('familycare-theme',isDark?'dark':'light'); document.getElementById('themeBtn').textContent=isDark?'Light':'Dark';};
document.getElementById('languageBtn').onclick=()=>toast('Limba RO este activă.');
document.getElementById('logoutBtn').onclick=()=>{localStorage.removeItem(SESSION_KEY);location.href='senior-login.html';};

function setTreatmentsCollapsed(value){
 treatmentsCollapsed=!!value;
 const page=document.querySelector('.kiosk-page');
 const strip=document.querySelector('.next-strip');
 const btn=document.getElementById('collapseTreatments');
 page&&page.classList.toggle('treatments-collapsed',treatmentsCollapsed);
 strip&&strip.classList.toggle('collapsed',treatmentsCollapsed);
 if(btn){btn.textContent=treatmentsCollapsed?'Arată':'Restrânge';btn.setAttribute('aria-expanded',String(!treatmentsCollapsed));}
}
const collapseBtn=document.getElementById('collapseTreatments');
if(collapseBtn) collapseBtn.onclick=()=>setTreatmentsCollapsed(!treatmentsCollapsed);
initSoundControls(); if(initSession()){renderDayCards(); loadFamilyContact(); loadEntities().then(loadTreatments); setInterval(loadTreatments,60000); setInterval(()=>{updateClock(); renderTreatments();},30000);}

</script>
