<!doctype html><html lang="ro"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FamilyCare Aparținător</title><link rel="manifest" href="/manifest.webmanifest"><link rel="stylesheet" href="/styles/common.css?v=4.0.0"><link rel="stylesheet" href="/styles/access-v4.css?v=4.0.0"></head><body class="caregiver-page"><header class="caregiver-top"><div><strong>FamilyCare</strong><span>Panou aparținător · v4.0.0</span></div><div><button id="themeBtn" class="icon-btn">☾</button><button id="logout" class="secondary">Ieșire</button></div></header><main class="caregiver-main"><section class="hero"><div><span class="eyebrow">REȚEAUA FAMILIEI</span><h1>Beneficiarii mei</h1><p>Codul fiecărui beneficiar este vizibil numai aici și este folosit la prima verificare în aplicația Senior.</p></div></section><div id="cards" class="beneficiary-grid"></div></main>
<dialog id="treatmentDialog"><form method="dialog" id="treatmentForm" class="dialog-card"><div class="dialog-head"><div><h2>Adaugă tratament</h2><p id="beneficiaryName"></p></div><button value="cancel" class="icon-btn">×</button></div><input type="hidden" name="entityCode"><label>Tratament<input name="title" required placeholder="Ex. Aspacardin"></label><label>Perioada<select name="periodDays"><option value="1">Zilnic</option><option value="2">La 2 zile</option><option value="3">La 3 zile</option><option value="4">La 4 zile</option><option value="5">La 5 zile</option><option value="6">La 6 zile</option><option value="7">Săptămânal</option></select></label><label>Ora<input name="time" type="time" required value="09:00"></label><div class="dialog-actions"><button value="cancel" class="secondary">Renunță</button><button id="saveTreatment" value="default" class="primary">Salvează tratamentul</button></div></form></dialog><div id="toast" class="toast"></div><script>
const $=s=>document.querySelector(s);let people=[];function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2400)}
document.documentElement.dataset.theme=localStorage.getItem('fc-theme')||'light';function refreshTheme(){ $('#themeBtn').textContent=document.documentElement.dataset.theme==='dark'?'☀':'☾'}refreshTheme();$('#themeBtn').onclick=()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('fc-theme',document.documentElement.dataset.theme);refreshTheme()};
$('#logout').onclick=async()=>{await fetch('/api/senior/logout',{method:'DELETE'});location.href='/pages/senior-login.html'};
async function load(){const r=await fetch('/api/network/beneficiaries');if(r.status===401)return location.href='/pages/senior-login.html';people=await r.json();$('#cards').innerHTML=people.map(p=>`<article class="person-card"><div class="person-avatar">${p.name.trim()[0]||'S'}</div><div class="person-main"><h2>${p.name}</h2><div class="facts"><span><small>Vârstă</small>${p.age||'—'}</span><span><small>Telefon</small>${p.phone||'—'}</span></div><div class="code-box"><small>Cod beneficiar</small><strong>${p.code}</strong><button class="copy" data-code="${p.code}">Copiază</button></div><button class="primary add-treatment" data-code="${p.code}" data-name="${p.name}">+ Adaugă tratament</button></div></article>`).join('');document.querySelectorAll('.copy').forEach(b=>b.onclick=()=>navigator.clipboard.writeText(b.dataset.code).then(()=>toast('Cod copiat')));document.querySelectorAll('.add-treatment').forEach(b=>b.onclick=()=>{const f=$('#treatmentForm');f.entityCode.value=b.dataset.code;$('#beneficiaryName').textContent=b.dataset.name;$('#treatmentDialog').showModal()})}
$('#treatmentForm').onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));data.periodDays=Number(data.periodDays);const r=await fetch('/api/network/treatment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok)return toast(j.error||'Tratamentul nu a fost salvat');$('#treatmentDialog').close();e.target.reset();toast('Tratamentul a fost adăugat')};load();
</script></body></html>
