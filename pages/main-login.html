<!doctype html>
<html lang="ro">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
 <meta name="theme-color" content="#1D4ED8">
 <link rel="manifest" href="../manifest.webmanifest">
 <link rel="apple-touch-icon" href="../assets/icon-192.png">
 <link rel="stylesheet" href="../styles/common.css">
 <link rel="stylesheet" href="../styles/compliance.css">
 <title>Autentificare - FamilyCare Main</title>
</head>
<body class="main-login-body">
 <main class="main-login-screen">
  <section class="main-login-card" aria-labelledby="loginTitle">
   <div class="main-login-brand"><img src="../assets/logo.svg" alt=""><div><b>FamilyCare Main</b><span>Acces administrativ securizat · v1.0.69</span></div></div>
   <div class="security-mark" aria-hidden="true">✓</div>
   <h1 id="loginTitle">Bine ai revenit</h1>
   <p>Introdu parola de administrator configurată pe server.</p>
   <form id="mainLoginForm" class="main-login-form">
    <label for="adminPassword">Parolă administrator</label>
    <input id="adminPassword" type="password" autocomplete="current-password" minlength="12" required autofocus>
    <p id="loginError" class="login-error" role="alert" hidden></p>
    <button type="submit" class="btn primary">Intră în FamilyCare</button>
   </form>
   <small>Conexiunea publică trebuie să folosească HTTPS. După cinci încercări nereușite, accesul este blocat temporar.</small>
  </section>
 </main>
 <script>
 (()=>{
  'use strict';
  const form=document.getElementById('mainLoginForm');
  const error=document.getElementById('loginError');
  const params=new URLSearchParams(location.search);
  const requested=params.get('next')||'/pages/dashboard.html';
  const next=requested.startsWith('/pages/')&&!requested.includes('main-login')?requested:'/pages/dashboard.html';
  fetch('/api/auth/session',{cache:'no-store'}).then(r=>r.json()).then(s=>{if(s.authenticated)location.replace(next);}).catch(()=>{});
  form.addEventListener('submit',async event=>{
   event.preventDefault();
   error.hidden=true;
   const button=form.querySelector('button');
   button.disabled=true;
   try{
    const response=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('adminPassword').value})});
    const result=await response.json();
    if(!response.ok)throw new Error(result.error||'Autentificarea nu a reușit.');
    location.replace(next);
   }catch(err){error.textContent=err.message||'Autentificarea nu a reușit.';error.hidden=false;button.disabled=false;}
  });
 })();
 </script>
</body>
</html>
