services:
  - type: web
    name: familycare-senior
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSCHEMA
        value: familycare
      - key: DATABASE_URL
        sync: false
      - key: MAIN_BASE_URL
        sync: false
      - key: SENIOR_PIN
        value: "2829"
